<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구초뉴스</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --border: rgba(17,17,17,0.1);
    --dim: rgba(17,17,17,0.25);
    --mid: rgba(17,17,17,0.45);
  }

  html, body { height:100%; }
  body {
    font-family: 'Pretendard', 'Helvetica Neue', Arial, sans-serif;
    background: #fff;
    color: #111;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }

  /* MAIN */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 400px;
    min-height: 100vh;
  }

  /* LOGO AREA */
  .logo-area {
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
  }

  /* LOGIN AREA */
  .login-area {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  /* LOGIN FORM */
  .login-form {
    width: 100%;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field-input {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    color: #111;
    background: #fff;
    border: 1px solid var(--border);
    padding: 12px 14px;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
    transition: border-color 0.12s;
  }
  .field-input:focus { border-color: #111; }
  .field-input::placeholder { color: var(--dim); }

  .login-btn {
    width: 100%;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: #111;
    border: none;
    padding: 13px;
    cursor: pointer;
    border-radius: 0;
    margin-top: 4px;
    transition: opacity 0.12s;
    letter-spacing: 0.02em;
  }
  .login-btn:hover { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.38; cursor: default; }

  .login-error {
    font-size: 11px;
    color: #c0392b;
    text-align: center;
  }

  /* LOADING */
  .loading-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .step-list {
    width: 280px;
    border-top: 1px solid var(--border);
  }
  .step-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--mid);
    gap: 12px;
    transition: color 0.15s;
  }
  .step-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--dim);
    min-width: 18px;
  }
  .step-text { flex: 1; }
  .step-icon { font-size: 11px; color: var(--dim); }

  .step-item.active { color: #111; }
  .step-item.active .step-icon { color: #111; }
  .step-item.done { color: #111; }
  .step-item.done .step-icon { color: #111; }

  .step-label {
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--mid);
  }

  /* DONE */
  .done-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .done-mark {
    font-size: 20px;
    font-weight: 900;
    color: #111;
  }
  .done-text { font-size: 12px; color: var(--mid); }

</style>
</head>
<body>

<main>

  <!-- 왼쪽: 로고 -->
  <div class="logo-area">
    <img src="public/logo.png" alt="구초뉴스" style="width:200px; height:200px; object-fit:contain; display:block;" />
  </div>

  <!-- 오른쪽: 로그인 / 로딩 / 완료 -->
  <div class="login-area">

    <!-- 로그인 폼 -->
    <form class="login-form" id="state-login" onsubmit="startLoading(event)">
      <p style="font-size:22px;font-weight:900;letter-spacing:-0.5px;margin-bottom:6px;">안녕하세요</p>
      <p style="font-size:12px;color:var(--mid);line-height:1.65;margin-bottom:24px;">인증된 사용자만 접근할 수 있습니다.<br>아이디와 비밀번호를 입력해 주세요.</p>
      <input class="field-input" type="text" placeholder="아이디" required />
      <input class="field-input" type="password" placeholder="비밀번호" required />
      <button class="login-btn" type="submit">로그인</button>
    </form>

    <!-- 로딩 -->
    <div class="loading-area" id="state-loading">
      <div class="step-list">
        <div class="step-item" id="step-0">
          <span class="step-num">01</span>
          <span class="step-text">CFD 중국우모협회 시세 조회 중</span>
          <span class="step-icon">—</span>
        </div>
        <div class="step-item" id="step-1">
          <span class="step-num">02</span>
          <span class="step-text">실시간 환율 조회 중</span>
          <span class="step-icon">—</span>
        </div>
        <div class="step-item" id="step-2">
          <span class="step-num">03</span>
          <span class="step-text">관세청 수입 데이터 조회 중</span>
          <span class="step-icon">—</span>
        </div>
        <div class="step-item" id="step-3">
          <span class="step-num">04</span>
          <span class="step-text">데이터 정리 중</span>
          <span class="step-icon">—</span>
        </div>
      </div>
      <span class="step-label" id="step-label">준비 중</span>
    </div>

    <!-- 완료 -->
    <div class="done-area" id="state-done">
      <div class="done-mark">✓</div>
      <div class="done-text">이동 중...</div>
    </div>

  </div>

</main>

<script>
  const STEPS = [
    'CFD 중국우모협회 시세 조회 중',
    '실시간 환율 조회 중',
    '관세청 수입 데이터 조회 중',
    '데이터 정리 중',
  ];

  function show(id) {
    ['state-login','state-loading','state-done'].forEach(s => {
      const el = document.getElementById(s);
      el.style.display = (s === id) ? 'flex' : 'none';
    });
  }

  function startLoading(e) {
    if (e) e.preventDefault();
    show('state-loading');
    let cur = 0;
    function next() {
      if (cur > 0) {
        const prev = document.getElementById('step-' + (cur-1));
        prev.classList.remove('active');
        prev.classList.add('done');
        prev.querySelector('.step-icon').textContent = '✓';
      }
      if (cur >= STEPS.length) {
        document.getElementById('step-label').textContent = '완료';
        setTimeout(() => show('state-done'), 400);
        return;
      }
      const el = document.getElementById('step-' + cur);
      el.classList.add('active');
      el.querySelector('.step-icon').textContent = '●';
      document.getElementById('step-label').textContent = STEPS[cur];
      cur++;
      setTimeout(next, 1000);
    }
    next();
  }

  show('state-login');
</script>
</body>
</html>
